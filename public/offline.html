<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You are offline — DriveMy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(59,130,246,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #94a3b8;
      max-width: 32ch;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #34d399;
    }

    button {
      margin-top: 0.5rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none"
           viewBox="0 0 24 24" stroke="#3b82f6" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945
                 M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0
                 004 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064" />
      </svg>
    </div>

    <div>
      <h1>You are offline</h1>
      <p style="margin-top: 0.5rem;">
        No internet connection detected. Your progress is saved locally
        and will sync automatically when you reconnect.
      </p>
    </div>

    <div class="pill">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M5 13l4 4L19 7" />
      </svg>
      Progress saved locally
    </div>

    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
